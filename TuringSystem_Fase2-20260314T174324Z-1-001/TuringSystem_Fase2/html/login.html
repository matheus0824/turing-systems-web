<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turing Systems - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variaveis.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>

    <header class="header">
        <div class="container header__bar">
            <a class="marca" href="index.html">
                <span class="marca_texto">Turing Systems</span>
            </a>

            <nav class="nav">
                <a href="index.html">Home</a>
            </nav>
        </div>
    </header>

    <video autoplay muted loop class="video-bg">
        <source src="../video/space.mp4" type="video/mp4">
    </video>

    <div class="login-card">
        <h3>Olá, bem-vindo(a)</h3>
        <div class="logo">
            <h1>TURING</h1>
        </div><br>
        <p>Faça o login abaixo</p>

        <form>
            <label>Usuário(a)*</label>
            <input type="text" placeholder="Informe seu usuário(a)">

            <label>Senha*</label>
            <input type="password" placeholder="Informe sua senha">

            <button type="submit">Entrar</button>
        </form><br>

        <p>Não tem uma conta? <a href="cadastro.html" id="cadastre">Cadastre-se</a></p>
    </div>

</body>

</html>
