<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turing Systems - Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/cadastro.css">
    <link rel="stylesheet" href="../css/variaveis.css">
</head>

<body>

    <video autoplay muted loop class="video-bg">
        <source src="../video/space.mp4" type="video/mp4">
    </video>

    <div class="login-card">

        <h2>Entre para a Turing Systems</h2>

        <form>
            <label>Nome</label>
            <input type="text" placeholder="Nome completo">

            <label>Email</label>
            <input type="email" placeholder="SeuEmail@gmail.com">

            <label>Senha</label>
            <input type="password" placeholder="Informe sua senha">

            <label>Celular</label>
            <input type="number" placeholder="(11) 99999-9999">

            <button>Cadastre-se</button>
            <p id="ja">Já possui conta? <a href="login.html" id="conta">Faça login</a></p>
        </form>
    </div>

</body>

</html>
